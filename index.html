<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ABA — Clothing Brand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 4px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .product {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .product-image {
      height: 200px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      letter-spacing: 2px;
      font-size: 16px;
    }

    .black {
      background: #111;
      color: white;
    }

    .white {
      background: #eee;
      color: #111;
    }

    .product-name {
      margin-top: 15px;
      font-size: 16px;
      font-weight: bold;
    }

    .price {
      margin-top: 5px;
      font-size: 15px;
    }

    .stock {
      margin-top: 8px;
      font-size: 13px;
      color: #d11;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 30px;
      margin-top: 40px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

  <header>ABA</header>

  <div class="container">

    <div class="section-title">Shop</div>

    <div class="products">

      <!-- Black Graffiti Tee -->
      <div class="product">
        <div class="product-image black">GRAFFITI</div>
        <div class="product-name">ABA Graffiti Tee — Black</div>
        <div class="price">$20</div>
        <div class="stock">Medium — Only 1 left</div>
      </div>

      <!-- White Logo Tee -->
      <div class="product">
        <div class="product-image white">LOGO</div>
        <div class="product-name">ABA Logo Tee — White</div>
        <div class="price">$20</div>
        <div class="stock">Medium — Only 1 left</div>
      </div>

    </div>

  </div>

  <footer>© <span id="year"></span> ABA — All Rights Reserved</footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
